name: Release CLI

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CLICOLOR: 1
  COLUMNS: 130
  BINARY_NAME: sss_cli

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build and Release
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sss_cli
            asset_name: sss_cli-linux-amd64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: sss_cli
            asset_name: sss_cli-linux-arm

          - os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact_name: sss_cli.exe
            asset_name: sss_cli-windows-amd64.exe

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: sss_cli.exe
            asset_name: sss_cli-windows-arm.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: sss_cli
            asset_name: sss_cli-macos-amd64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sss_cli
            asset_name: sss_cli-macos-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux linker dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang mold

      - name: Install Linux ARM dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Set linker for Linux ARM
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "artifacts/${{ matrix.asset_name }}"
          else
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "artifacts/${{ matrix.asset_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: artifacts/${{ matrix.asset_name }}

  create-release:
    needs: build-and-release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sss_cli-linux-amd64/sss_cli-linux-amd64
            sss_cli-windows-amd64.exe/sss_cli-windows-amd64.exe
            sss_cli-macos-amd64/sss_cli-macos-amd64
            sss_cli-linux-arm/sss_cli-linux-arm
            sss_cli-windows-arm.exe/sss_cli-windows-arm.exe
            sss_cli-macos-arm/sss_cli-macos-arm
          draft: false
          prerelease: false
          generate_release_notes: true
          append_body: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
