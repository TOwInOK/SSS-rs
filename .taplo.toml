include = ["**/Cargo.toml", ".taplo.toml"]

[formatting]
# Formatter options: https://taplo.tamasfe.dev/configuration/formatter-options.html
align_comments = false
array_auto_collapse = false
column_width = 120
indent_tables = true
reorder_keys = false

[[rule]]
keys = ["workspace"]

[rule.formatting]
indent_tables = false

[[rule]]
keys = [
    "dependencies",
    "dev-dependencies",
    "build-dependencies",
    "workspace.dependencies",
    "formatting",
]

[rule.formatting]
reorder_keys = true
